<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NanoClaw</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Connection Screen -->
<div id="connect-screen">
  <div class="connect-card">
    <h1>NanoClaw</h1>
    <div class="subtitle">Connect to your NanoClaw instance</div>
    <form id="connect-form">
      <div class="connect-field">
        <label for="connect-endpoint">Endpoint URL</label>
        <input id="connect-endpoint" type="text" placeholder="http://192.168.1.100:3456" autocomplete="url" spellcheck="false">
      </div>
      <div class="connect-field">
        <label for="connect-token">API Token</label>
        <input id="connect-token" type="password" placeholder="Your API token" autocomplete="current-password">
      </div>
      <button type="submit" class="connect-btn" id="connect-btn">Connect</button>
      <label class="connect-remember">
        <input type="checkbox" id="connect-remember"> Remember connection
      </label>
      <div class="connect-error" id="connect-error"></div>
    </form>
  </div>
</div>

<!-- App (hidden until connected) -->
<div id="app">

  <!-- Sidebar Navigation -->
  <div id="sidebar">
    <div class="sidebar-header">
      <h1 id="assistant-title">NanoClaw</h1>
      <div class="spacer"></div>
      <button class="theme-toggle" id="theme-toggle" title="Toggle theme">&#9788;</button>
      <button class="disconnect-btn" id="disconnect-btn" title="Disconnect">&#x2715;</button>
    </div>

    <nav id="nav">
      <div class="nav-item active" data-view="dashboard">
        <span class="nav-icon">&#9632;</span>
        <span class="nav-label">Dashboard</span>
      </div>
      <div class="nav-item" data-view="groups">
        <span class="nav-icon">&#9733;</span>
        <span class="nav-label">Groups</span>
        <span class="nav-badge" id="nav-groups-count"></span>
      </div>
      <div class="nav-item" data-view="tasks">
        <span class="nav-icon">&#9200;</span>
        <span class="nav-label">Tasks</span>
        <span class="nav-badge" id="nav-tasks-count"></span>
      </div>
      <div class="nav-item" data-view="chat">
        <span class="nav-icon">&#9993;</span>
        <span class="nav-label">Chat</span>
      </div>
      <div class="nav-item" data-view="system">
        <span class="nav-icon">&#9881;</span>
        <span class="nav-label">System</span>
      </div>
    </nav>

    <div id="sidebar-status">
      <div class="status-row">
        <div class="dot" id="sidebar-dot"></div>
        <span id="sidebar-status-text">disconnected</span>
      </div>
    </div>
  </div>

  <!-- Main content area -->
  <div id="main">
    <div id="main-content"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
